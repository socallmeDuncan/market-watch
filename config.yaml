targets:
  stocks:
    - code: "300857"
      name: "协创数据"
      role: "primary"
    - code: "300475"
      name: "香农芯创"
      role: "compare"
  indices:
    - code: "399006"
      name: "创业板指"
      role: "context"
    - code: "399001"
      name: "深证成指"
      role: "context"
    - code: "000001"
      name: "上证指数"
      role: "context"

runtime:
  interval_seconds: 60
  market_hours_only: true
  market_timezone: "Asia/Shanghai"
  history_windows_minutes: [15, 30, 60]
  request_timeout_seconds: 15
  retry_count: 1

storage:
  snapshot_dir: "data/snapshots"
  latest_markdown: "outputs/latest.md"
  latest_json: "outputs/latest.json"
  intraday_dir: "data/intraday"
  today_markdown: "outputs/today.md"
  today_json: "outputs/today.json"

source:
  provider: "akshare"
  stock_source: "eastmoney"
  index_symbol: "沪深重要指数"
